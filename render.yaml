services:
  - type: web
    name: cuatro-pajaros-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: mongodb
          property: connectionString
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: "*"
