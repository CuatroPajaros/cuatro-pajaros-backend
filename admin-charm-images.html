<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Imágenes de Charms</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    select, input {
      display: block;
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    select:hover, input:hover {
      border-color: #667eea;
    }

    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 8px;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result.success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }

    .result.error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }

    .result.loading {
      background: #e2e3e5;
      border: 1px solid #d6d8db;
      color: #383d41;
    }

    .result h3 {
      margin-bottom: 8px;
      font-size: 16px;
    }

    .result p {
      font-size: 14px;
      line-height: 1.5;
    }

    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 30px;
      font-size: 13px;
      color: #444;
    }

    .info-box strong {
      color: #667eea;
    }

    #charmSelect {
      max-height: 300px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Admin - Imágenes de Charms</h1>
    <p class="subtitle">Vincula fotos de Cloudinary a tus charms</p>

    <div class="info-box">
      <strong>📋 Cómo usar:</strong><br>
      1. Selecciona un charm del inventario<br>
      2. Pega la URL de Cloudinary<br>
      3. Click "Guardar"<br>
      La foto se vinculará automáticamente.
    </div>

    <form id="imageForm">
      <div class="form-group">
        <label for="charmSelect">Selecciona un charm:</label>
        <select id="charmSelect" required>
          <option value="">Cargando charms...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="urlInput">URL de Cloudinary:</label>
        <input
          type="url"
          id="urlInput"
          placeholder="https://res.cloudinary.com/..."
          required
        >
      </div>

      <button type="submit" id="submitBtn">Guardar Imagen</button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    const form = document.getElementById('imageForm');
    const charmSelect = document.getElementById('charmSelect');
    const urlInput = document.getElementById('urlInput');
    const submitBtn = document.getElementById('submitBtn');
    const resultDiv = document.getElementById('result');

    // Cargar lista de charms
    async function loadCharms() {
      try {
        const response = await fetch('https://cuatropajaros.onrender.com/api/products');
        const products = await response.json();

        // Filtrar solo charms
        const charms = products.filter(p => p.type === 'CHARM');

        // Poblar select
        charmSelect.innerHTML = '';
        charms.forEach(charm => {
          const option = document.createElement('option');
          option.value = charm.name;
          option.textContent = charm.name;
          charmSelect.appendChild(option);
        });

        if (charms.length === 0) {
          showResult('error', '❌ Error', 'No se encontraron charms en el inventario');
        }
      } catch (error) {
        showResult('error', '❌ Error', 'No se pudieron cargar los charms: ' + error.message);
      }
    }

    // Cargar charms al abrir la página
    window.addEventListener('load', loadCharms);

    // Manejar submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const charmName = charmSelect.value;
      const cloudinaryUrl = urlInput.value;

      if (!charmName || !cloudinaryUrl) {
        showResult('error', '❌ Error', 'Por favor completa todos los campos');
        return;
      }

      try {
        submitBtn.disabled = true;
        showResult('loading', '⏳ Guardando...', 'Vinculando imagen...');

        const response = await fetch('https://cuatropajaros.onrender.com/api/save-charm-image', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            charm_name: charmName,
            cloudinary_url: cloudinaryUrl
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Error al guardar');
        }

        showResult(
          'success',
          '✅ ¡Guardado!',
          `La imagen se vinculó correctamente a "${charmName}". Aparecerá en el configurador en unos momentos.`
        );

        // Limpiar inputs
        urlInput.value = '';
      } catch (error) {
        showResult('error', '❌ Error', error.message);
      } finally {
        submitBtn.disabled = false;
      }
    });

    function showResult(type, title, message) {
      resultDiv.className = `result ${type}`;
      resultDiv.innerHTML = `
        <h3>${title}</h3>
        <p>${message}</p>
      `;
      resultDiv.style.display = 'block';
    }
  </script>
</body>
</html>
